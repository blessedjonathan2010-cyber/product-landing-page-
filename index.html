<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MY SITE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-white text-grey-900 dark:text-gray-100 dark:text-gray-900">
    <!-- Navbar -->

    <nav
      class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700"
    >
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between text-white h-20"
      >
        <h1 class="font-bold text-xl">Zivah</h1>
        <ul class="flex gap-5">
          <li class="hover:text-blue-300"><a href="#">Features</a></li>
          <li class="hover:text-blue-300"><a href="#">Pricing</a></li>
          <li class="hover:text-blue-300"><a href="#">About</a></li>
        </ul>

        <button class="hover:text-blue-400 bg-indigo-900 py-1 px-1  rounded-xl">Get Started</button>
      </div>
    </nav>

    <section class="py-20 md:py-32 px-6 bg-indigo-100 h-screen">
      <!-- Hero -->
      <div>
        <span
          class="bg-indigo-200 text-indigo-700 rounded-full py-1 text-xs font-semibold px-2"
          >LIMITED EDITION</span
        >
        <h1 class="text-5xl md:text-6xl lg:text-7xl font-black leading-tight ">
          Luxury That Speaks For You
        </h1>
        <p
          class="text-lg md:text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx auto"
        >
          Discover beautifully designed jewelry pieces that elevate your
          everyday
        </p>

        <!-- primary button -->
        <div
          class="flex flex-col sm:flex-row items-center justify-center gap-4 mt-15">
          <button class="bg-indigo-700 py-2 px-2 w-34 rounded-xl hover:bg-indigo-600 text-white">Shop Now</button>
          <!-- secondary button -->
          <button class="py-2 rounded-xl px-2 text-black hover:bg-indigo-500 border-2 border-indigo-500">
            View collections
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
